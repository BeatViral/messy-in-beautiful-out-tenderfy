<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Messy In, Beautiful Out — a product thought for Tenderfy">
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#63E6FF" stroke-opacity=".08"/></pattern>
    <radialGradient id="glow"><stop stop-color="#0E4A4A"/><stop offset="1" stop-color="#07131F" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#07131F"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="950" cy="160" r="430" fill="url(#glow)" opacity=".78"/>
  <path d="M72 74h1056" stroke="#A7B4BE" stroke-opacity=".2"/>
  <text x="72" y="58" fill="#A7B4BE" font-family="monospace" font-size="14" letter-spacing="3">AN INDEPENDENT PRODUCT THOUGHT FOR TENDERFY</text>
  <text x="72" y="260" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="105" font-weight="700" letter-spacing="-6">Messy in.</text>
  <text x="72" y="370" fill="#C9FF72" font-family="Arial, sans-serif" font-size="105" font-weight="700" letter-spacing="-6">Beautiful out.</text>
  <text x="78" y="438" fill="#A7B4BE" font-family="Arial, sans-serif" font-size="24">Turn project stories into evidence-backed tender work.</text>
  <g transform="translate(78 520)" font-family="monospace" font-size="13" letter-spacing="2">
    <text fill="#FFFFFF">CONVERSATION</text><text x="148" fill="#63E6FF">→</text><text x="180" fill="#FFFFFF">EVIDENCE</text><text x="278" fill="#63E6FF">→</text><text x="310" fill="#FFFFFF">REQUIREMENTS</text><text x="445" fill="#63E6FF">→</text><text x="477" fill="#FFFFFF">SUBMISSION</text>
  </g>
  <g transform="translate(875 212)"><circle cx="120" cy="120" r="118" fill="none" stroke="#63E6FF" stroke-opacity=".18"/><circle cx="120" cy="120" r="86" fill="none" stroke="#C9FF72" stroke-opacity=".36" stroke-dasharray="5 8"/><circle cx="120" cy="120" r="56" fill="#0B2235" stroke="#C9FF72"/><text x="120" y="126" text-anchor="middle" fill="#C9FF72" font-family="monospace" font-size="17">M → B</text></g>
</svg>
